      - Project Management
      - Stop Clock
      - Time Tracking
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.clockodo.com/en/api/
    baseURL: https://my.clockodo.com/api
    properties:
      - url: https://www.clockodo.com/en/api/
        type: Documentation
      - url: https://www.clockodo.com/en/api/authentication/
        type: Authentication
      - url: openapi/clockodo-openapi.yml
        type: OpenAPI
    description: >-
      The Clockodo API is a REST interface at my.clockodo.com that lets
      developers automate time tracking and project management. v2
      endpoints under /api/v2 cover entries, customers, projects,
      services, users, lump-sum services, and the stop-clock; legacy
      endpoints under /api cover absences and holiday quotas. Calls
      authenticate with X-ClockodoApiUser plus X-ClockodoApiKey (or
      HTTP Basic with the same credentials) and identify the calling
      app via X-Clockodo-External-Application; responses are JSON.
