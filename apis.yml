description: >-
  Clockodo is a German-built, cloud-based time-tracking and project-
  management application used by service firms, agencies, and freelancers.
  In addition to its web and mobile apps, Clockodo exposes a REST API at
  my.clockodo.com that mirrors the objects in the UI: time entries,
  customers, projects, services, users, absences, holiday quotas,
  lump-sum services, and a real-time stop-clock. Authentication uses a
  per-user email plus per-user API key delivered as the
  X-ClockodoApiUser/X-ClockodoApiKey header pair (or HTTP Basic), and
  every call must include the X-Clockodo-External-Application header
  identifying the integrating application.
apis:
  - aid: clockodo:clockodo-api
    name: Clockodo API
    tags:
      - Absence Management
