capabilities:
  - id: clockodo.track-time-entries
    name: Track and manage time entries
    description: >-
      Create, list, update, and delete time-tracking entries against
      customers, projects, and services to power timesheets, reporting,
      and downstream invoicing.
    apis:
      - clockodo:clockodo-api
  - id: clockodo.manage-customers-projects
    name: Manage customers and projects
    description: >-
      Maintain the customer and project hierarchy (with budgets,
      billable flags, and hourly rates) used as the dimensional model
      for time entries.
    apis:
      - clockodo:clockodo-api
  - id: clockodo.manage-service-catalog
    name: Maintain the service catalog
    description: >-
      Define the services (work types) that users can book time
      against, including default rates and lump-sum services for
      fixed-price billing.
    apis:
      - clockodo:clockodo-api
  - id: clockodo.manage-users
    name: Manage users and access
    description: >-
      Manage co-workers in the Clockodo account: add new users, update
      profile details, and deactivate users when they leave.
    apis:
      - clockodo:clockodo-api
  - id: clockodo.record-absences
    name: Record absences and holiday quotas
    description: >-
      Capture vacation, sickness, and other absence types and manage
      per-user holiday quotas to feed payroll and capacity-planning
      workflows.
    apis:
      - clockodo:clockodo-api
  - id: clockodo.control-stopclock
    name: Control the live stop-clock
    description: >-
      Programmatically start, query, and stop the real-time stop-clock
      so that time tracking can be embedded into other tools or
      desktop integrations.
    apis:
      - clockodo:clockodo-api
