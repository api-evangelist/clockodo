naftiko: 1.0.0-alpha2
info:
  label: Clockodo API — Entries
  description: 'Clockodo API — Entries. 5 operations. Lead operation: List time entries. Self-contained Naftiko capability
    covering one Clockodo business surface.'
  tags:
  - Clockodo
  - Entries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CLOCKODO_API_KEY: CLOCKODO_API_KEY
capability:
  consumes:
  - type: http
    namespace: clockodo-entries
    baseUri: https://my.clockodo.com/api
    description: Clockodo API — Entries business capability. Self-contained, no shared references.
    resources:
    - name: v2-entries
      path: /v2/entries
      operations:
      - name: listentries
        method: GET
        description: List time entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: time_since
          in: query
          type: string
        - name: time_until
          in: query
          type: string
        - name: filter[users_id]
          in: query
          type: integer
        - name: filter[customers_id]
          in: query
          type: integer
        - name: filter[projects_id]
          in: query
          type: integer
      - name: createentry
        method: POST
        description: Create a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-entries-id
      path: /v2/entries/{id}
      operations:
      - name: getentry
        method: GET
        description: Get a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateentry
        method: PUT
        description: Update a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteentry
        method: DELETE
        description: Delete a time entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-ClockodoApiKey
      value: '{{env.CLOCKODO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: clockodo-entries-rest
    port: 8080
    description: REST adapter for Clockodo API — Entries. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/entries
      name: v2-entries
      description: REST surface for v2-entries.
      operations:
      - method: GET
        name: listentries
        description: List time entries
        call: clockodo-entries.listentries
        with:
          time_since: rest.time_since
          time_until: rest.time_until
          filter[users_id]: rest.filter[users_id]
          filter[customers_id]: rest.filter[customers_id]
          filter[projects_id]: rest.filter[projects_id]
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createentry
        description: Create a time entry
        call: clockodo-entries.createentry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/entries/{id}
      name: v2-entries-id
      description: REST surface for v2-entries-id.
      operations:
      - method: GET
        name: getentry
        description: Get a time entry
        call: clockodo-entries.getentry
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateentry
        description: Update a time entry
        call: clockodo-entries.updateentry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteentry
        description: Delete a time entry
        call: clockodo-entries.deleteentry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: clockodo-entries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Clockodo API — Entries. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-time-entries
      description: List time entries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: clockodo-entries.listentries
      with:
        time_since: tools.time_since
        time_until: tools.time_until
        filter[users_id]: tools.filter[users_id]
        filter[customers_id]: tools.filter[customers_id]
        filter[projects_id]: tools.filter[projects_id]
      outputParameters:
      - type: object
        mapping: $.
    - name: create-time-entry
      description: Create a time entry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: clockodo-entries.createentry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-time-entry
      description: Get a time entry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: clockodo-entries.getentry
      outputParameters:
      - type: object
        mapping: $.
    - name: update-time-entry
      description: Update a time entry
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: clockodo-entries.updateentry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-time-entry
      description: Delete a time entry
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: clockodo-entries.deleteentry
      outputParameters:
      - type: object
        mapping: $.
